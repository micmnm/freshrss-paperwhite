services:
  freshrss:
    image: ghcr.io/linuxserver/freshrss:latest
    container_name: paperwhite-dev
    environment:
      - PUID=501
      - PGID=20
      - TZ=Europe/Bucharest
      - CRON_MIN=""
    ports:
      - "8888:80"
    volumes:
      - ./config:/config
      - ../..:/app/www/p/themes/Paperwhite:ro
    restart: "no"
